<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Lost & Found</title>
    <link rel="stylesheet" href="static/app.css">
</head>
<body class="app-layout">

    <div class="navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div id="user-menu-btn" style="background: white; padding: 10px; border-radius: 50%; font-weight: bold; cursor: pointer;">
                User Initials &#x25BC;
            </div>
            <a href="/" style="text-decoration: none; color: #d9534f; font-weight: bold; margin-left: 10px;">Logout</a>
        </div>

        <h2>DashBoard</h2>

        <div class="search-bar">
            <span style="font-size: 20px; margin-right: 10px;">&#128269;</span>
            <input type="text" id="search-input" placeholder="Find your item...">
            <button style="width: auto; height: auto; margin: 0; padding: 2px 10px;">Filters =</button>
        </div>

        <div>
            <select onchange="location = this.value;" style="padding: 5px; font-size: 16px;">
                <option value="#">Menu</option>
                <option value="/create-listing">Create Listing</option>
                <option value="#">Edit Listings</option>
                <option value="#">Claimed Listings</option>
                <option value="#">Messages</option>
            </select>
        </div>
    </div>

    <div class="filter-menu" id="filter-menu">
        <a href="#" class="active" style="text-decoration: underline;">Apply All</a>
        <a href="#">Accessories</a>
        <a href="#">Apparel</a>
        <a href="#">Books</a>
        <a href="#">Electronics</a>
        <a href="#">Other</a>
        <a href="#">Clear</a>
    </div>

    <div class="grid-container" id="listings-grid">
        <div class="card" onclick="location.href='/listing-info'" style="cursor: pointer;">
            <div class="card-img">Picture</div>
            <p><strong>Blue Water Bottle</strong><br>Found in Buley Library.</p>
        </div>
        
        <div class="card" onclick="location.href='/listing-info'" style="cursor: pointer;">
            <div class="card-img">Picture</div>
            <p><strong>Calculus Textbook</strong><br>Found in Engleman Hall.</p>
        </div>
        
        <div class="card" onclick="location.href='/listing-info'" style="cursor: pointer;">
            <div class="card-img">Picture</div>
            <p><strong>AirPods Case</strong><br>Lost near Student Center.</p>
        </div>
    </div>

    <script src="static/dashboard.js"></script>
</body>
</html>
