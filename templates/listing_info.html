<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listing Details - Lost & Found</title>
    <link rel="stylesheet" href="static/app.css">
</head>
<body class="app-layout listing-page-body">

    <a href="/dashboard" class="listing-back-link">&larr; Back to Dashboard</a>

    <div class="listing-container">
        
        <h1 class="listing-title">Water Bottle</h1>
        
        <div class="listing-image">Picture</div>

        <div class="listing-content">
            <div class="listing-info-group">
                <div class="listing-avatar">UI</div>
                <div class="listing-details">
                    <h3>Detailed description</h3>
                    <p>Found at Buley Library on 10/24/2026. Purple stainless steel waterbottle with a small dent on the bottom.</p>
                    <span class="listing-timestamp" id="listing-timestamp"></span>
                </div>
            </div>

            <div class="listing-actions">
                <button id="connect-btn" class="btn-connect">Connect &#128172;</button>
                <button id="report-btn" class="btn-report">Report</button>
            </div>
        </div>

        <div id="chat-thread" class="chat-thread">
            <h4>Thread message</h4>
            <div class="chat-message received">Hey, that's my water bottle!</div>
            <div class="chat-message sent">Great, where should we meet?</div>
            
            <form id="chat-form" class="chat-form">
                <input type="text" id="chat-input" placeholder="Type a message...">
                <button type="submit">Send</button>
            </form>
        </div>
    </div>

    <div id="report-modal" class="report-modal">
        <div class="report-modal-content">
            <h3>What's wrong with this listing?</h3>
            <form id="report-form">
                <label class="report-radio-label">
                    <input type="radio" name="report-reason" value="False Claim" required> False Claim
                </label>
                <label class="report-radio-label">
                    <input type="radio" name="report-reason" value="Inappropriate Content"> Inappropriate Content
                </label>
                <label class="report-radio-label">
                    <input type="radio" name="report-reason" value="Personal Information"> Personal Information
                </label>
                
                <div class="report-modal-buttons">
                    <button type="button" id="cancel-report-btn" class="btn-cancel">Cancel</button>
                    <button type="submit" class="btn-submit-report">Submit</button>
                </div>
            </form>
        </div>
    </div>

    <script src="static/timeformat.js"></script>
    <script src="static/listing_info.js"></script>
</body>
</html>
