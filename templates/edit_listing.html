<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Your Listing</title>
    <link rel="stylesheet" href="static/app.css">
</head>
<body class="app-layout">

    <div class="edit-listing-header">
        <h1>Edit Listing</h1>
    </div>

    <form class="form-container" id="edit-listing-form">
        <div class="form-content">
            <div class="form-group">
                <label for="listing-date">Date:</label>
                <input type="date" id="listing-date" required>
            </div>

            <div class="form-group">
                <label for="listing-category">Category:</label>
                <select id="listing-category" required title="Select the item category">
                    <option value="">-Select-</option>
                    <option value="Accessories">Accessories</option>
                    <option value="Apparel">Apparel</option>
                    <option value="Books">Books</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="listing-location">Found at / Lost at:</label>
                <select id="listing-location" required title="Select the location where item was found or lost">
                    <option value="">-Select-</option>
                    <option value="Buley Library">Buley Library</option>
                    <option value="Engleman Hall">Engleman Hall</option>
                    <option value="Jennings Hall">Jennings Hall</option>
                    <option value="Morrill Hall">Morrill Hall</option>
                    <option value="Student Center">Student Center</option>
                </select>
            </div>

            <div class="form-group">
                <label for="listing-description">Description:</label>
                <textarea id="listing-description" required rows="4" placeholder="Item description: Color, brand, any features!"></textarea>
            </div>

            <div class="form-buttons">
                <!-- Cancel goes back to my_listings -->
                <button type="button" class="btn-form btn-cancel-form" onclick="location.href='/my_listings'">Cancel</button>
                <!-- Button text updated to Save -->
                <button type="submit" class="btn-form btn-save">Save Changes</button>
            </div>
        </div>

        <div class="form-right-column">
            <div class="form-group">
                <label for="listing-title">Title:</label>
                <input type="text" id="listing-title" required placeholder="e.g. Water Bottle">
            </div>

            <div class="image-upload-area">
                <span class="image-upload-text">Update Image</span>
                <input type="file" id="listing-image" accept="image/*" class="image-upload-input" title="Select image file">
            </div>
        </div>
    </form>
</body>
</html>
