<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <link rel="stylesheet" href="static/auth.css">
</head>
<body>
<h2 style="font-size: 50px;">Reset Your Password</h2>
<div style="background: rgba(255, 255, 255, 0.9); padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; text-align: center;">
<h3 style="font-size: 25px; margin-top: 0;">Enter New Password</h3>
<p id="reset-error" style="color: red; font-size: 14px; font-weight: bold;"></p>
<form id="reset-form">
    <input type="password" id="new-password" placeholder="New Password" required><br><br>
    <input type="password" id="confirm-password" placeholder="Confirm Password" required><br><br>
    <button style="font-size: 18px;" type="submit">Update Password</button>
</form>
</div>
<script>

    const urlPath = window.location.pathname; 
    const token = urlPath.split('/').pop();

    document.getElementById('reset-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const password = document.getElementById('new-password').value;
        const confirm = document.getElementById('confirm-password').value;
        if (password !== confirm) {
            document.getElementById('reset-error').innerText = "Passwords do not match.";
            return;
        }
        try {
            const response = await fetch('/reset/' + token, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: password })
            });
            const result = await response.text();
            alert(result);
           
            window.location.href = '/';
        } catch (err) {
            document.getElementById('reset-error').innerText = "Error updating password.";
            console.error(err);
        }
    });
</script>
</body>
</html>
