<!DOCTYPE html>
<html>
<head>
    <title>My Listings</title>
    <link rel="stylesheet" href="static/app.css">
    <link rel="stylesheet" href="static/my_listings.css">
</head>
<body class="app-layout">

    <div style="text-align: center; margin: 20px 0; position: relative;">
        <a href="/dashboard" style="position: absolute; left: 70px; top: 10px; text-decoration: none; font-size: 20px;">&larr; Back</a>
        <h1 style="font-size: 40px; font-family: serif; margin: 0;">My Listings</h1>
    </div>

     <div id="listing-count">Total Listings: 8</div>


    <main class="listings-split-view">
        <!-- Active Section -->
        <section class="listing-column">
            <h2>Active Listings</h2>
            <div class="column-grid">
                <!-- Card 1 -->
                <div class="listing-card">
                    <div class="listing-info">
                        <strong>Purple Water Bottle</strong>
                        <p>Buley Library</p>
                    </div>
                    <div class="listing-actions">
                        <button class="icon-btn" onclick="editListing(1)">✏️</button>
                        <button class="icon-btn delete-btn" onclick="deleteListing(1)">🗑️</button>
                    </div>
                </div>
                <!-- Test Cards -->
                <div class="listing-card"><strong>Test 1</strong></div>
                <div class="listing-card"><strong>Test 2</strong></div>
                <div class="listing-card"><strong>Test 3</strong></div>
                <div class="listing-card"><strong>Test 4</strong></div>
            </div>
        </section>

        <!-- Resolved Section -->
        <section class="listing-column resolved-zone">
            <h2>Resolved</h2>
            <div class="column-grid">
                <div class="listing-card"><strong>Test 5</strong></div>
                <div class="listing-card"><strong>Test 6</strong></div>
                <div class="listing-card"><strong>Test 7</strong></div>
            </div>
        </section>

    </main>

    <script src="static/my_listings.js"></script>
</body>
</html>
