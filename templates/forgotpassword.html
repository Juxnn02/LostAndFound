<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="static/auth.css">
</head>

<body>

    <h2>
        Lost
        <img src="static/magnify glass.png" alt="Magnifying glass icon">
        Found
    </h2>

    <div class="auth-container">
        <h3>Reset Password</h3>

        <p id="forgot-error" class="auth-error"></p>

        <form id="forgot-step-1" onsubmit="handleForgotSubmit(event)">
            <p class="auth-description">Enter your @southernct.edu email to receive a recovery code.</p>
            <input type="email" id="forgot-email" placeholder="School Email" required><br><br>
            <button class="auth-button" type="submit">Send Code</button>
        </form>

        <form id="forgot-step-2" onsubmit="handleForgotVerify(event)" style="display: none;">
            <p style="font-size: 14px; color: #555;">Enter the verification code sent to your email.</p>
            <input type="text" id="verification-code" placeholder="Verification Code" required><br><br>
            <button style="font-size: 18px;" type="submit">Verify Code</button>
            <form id="forgot-step-2" class="auth-form" onsubmit="handleForgotVerify(event)">
                <p class="auth-description">Enter the verification code sent to your email.</p>
                <input type="text" placeholder="Verification Code" required><br><br>
                <button class="auth-button" type="submit">Verify Code</button>
            </form>

            <form id="forgot-step-3" class="auth-form" onsubmit="handleResetPassword(event)">
                <p id="reset-error" class="auth-error"></p>
                <input type="password" id="new-password" placeholder="New Password" required><br><br>
                <input type="password" id="new-confirm" placeholder="Confirm Password" required><br><br>
                <button class="auth-button" type="submit">Update Password</button>
            </form>

            <p class="auth-links">
                <a href="/">Back to Login</a>
            </p>
    </div>

    <script src="static/validation.js"></script>
    <script src="static/forgotpassword.js"></script>
</body>

</html>
